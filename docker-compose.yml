services:
  bot:
    build: .
    container_name: weather-bot
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./data:/app/data          # Persist SQLite DB + cache
      - ./.env:/app/.env:ro       # Inject secrets
    environment:
      - TZ=UTC
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
