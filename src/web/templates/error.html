{% extends "base.html" %}
{% block title %}{{ code }} - WeatherBot{% endblock %}
{% block content %}
<div style="text-align:center;padding:80px 20px;">
    <div style="font-size:72px;font-weight:700;color:var(--text-dim);letter-spacing:-3px;">{{ code }}</div>
    <div style="font-size:20px;font-weight:600;margin:12px 0;">{{ message }}</div>
    <div style="font-size:14px;color:var(--text-muted);max-width:500px;margin:16px auto;">{{ detail }}</div>
    <a href="/" class="btn btn-primary" style="display:inline-block;margin-top:24px;text-decoration:none;">Back to Dashboard</a>
</div>
{% endblock %}
