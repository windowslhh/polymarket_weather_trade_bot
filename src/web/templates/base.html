<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Weather Bot{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117; --bg-card: #1a1d27; --bg-card-hover: #1e2230;
            --bg-sidebar: #13151d; --border: #2a2d3a; --border-light: #353849;
            --text: #e4e6ef; --text-muted: #8b8fa3; --text-dim: #5e6278;
            --accent: #6366f1; --accent-light: #818cf8; --accent-glow: rgba(99,102,241,0.15);
            --green: #22c55e; --green-dim: rgba(34,197,94,0.12); --green-text: #4ade80;
            --red: #ef4444; --red-dim: rgba(239,68,68,0.12); --red-text: #f87171;
            --yellow: #f59e0b; --yellow-dim: rgba(245,158,11,0.12);
            --blue: #3b82f6; --blue-dim: rgba(59,130,246,0.12);
            --radius: 12px; --radius-sm: 8px;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; font-size: 14px; line-height: 1.5; }

        /* Sidebar */
        .sidebar { width: 240px; background: var(--bg-sidebar); border-right: 1px solid var(--border); padding: 24px 16px; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 8px; margin-bottom: 32px; }
        .sidebar-logo .icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #a855f7); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .sidebar-logo h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
        .sidebar-logo span { font-size: 11px; color: var(--text-muted); font-weight: 400; }
        .nav-section { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; padding: 0 8px; margin: 20px 0 8px; }
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); color: var(--text-muted); text-decoration: none; transition: all 0.15s; font-weight: 500; font-size: 13px; }
        .nav-link:hover { background: var(--accent-glow); color: var(--text); }
        .nav-link.active { background: var(--accent-glow); color: var(--accent-light); }
        .nav-link svg { width: 18px; height: 18px; flex-shrink: 0; }
        .sidebar-footer { margin-top: auto; padding: 16px 8px; border-top: 1px solid var(--border); }

        /* Main content */
        .main { margin-left: 240px; flex: 1; min-height: 100vh; }
        .topbar { position: sticky; top: 0; background: rgba(15,17,23,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; justify-content: space-between; align-items: center; z-index: 5; }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.err { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .mode-badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .mode-paper { background: var(--yellow-dim); color: var(--yellow); }
        .mode-dry { background: rgba(107,114,128,0.2); color: #9ca3af; }
        .mode-live { background: var(--red-dim); color: var(--red); }
        .last-run { font-size: 12px; color: var(--text-muted); }
        .btn { padding: 8px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; font-family: inherit; }
        .btn:hover { background: var(--bg-card-hover); border-color: var(--accent); }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-light); }

        .content { padding: 28px 32px; }
        .page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.5px; }

        /* Metric cards */
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .metric-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: border-color 0.2s; }
        .metric-card:hover { border-color: var(--border-light); }
        .metric-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .metric-value { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
        .metric-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
        .metric-value.positive { color: var(--green-text); }
        .metric-value.negative { color: var(--red-text); }

        /* Cards / panels */
        .panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; overflow: hidden; }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h3 { font-size: 14px; font-weight: 600; }
        .panel-body { padding: 16px 20px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 16px; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); font-weight: 600; }
        td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .td-mono { font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 12px; }

        /* Tags / badges */
        .tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .tag-stable { background: rgba(107,114,128,0.15); color: #9ca3af; }
        .tag-breakout-up { background: var(--red-dim); color: var(--red-text); }
        .tag-breakout-down { background: var(--blue-dim); color: var(--blue); }
        .tag-settling { background: var(--green-dim); color: var(--green-text); }
        .tag-buy { background: var(--green-dim); color: var(--green-text); }
        .tag-sell { background: var(--red-dim); color: var(--red-text); }
        .tag-skip { background: rgba(107,114,128,0.15); color: #9ca3af; }

        /* Grid layouts */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

        /* Trends row */
        .trends-row { display: flex; flex-wrap: wrap; gap: 8px; }

        /* Chart container */
        .chart-container { position: relative; height: 200px; }

        /* Highlight row */
        .row-highlight { background: rgba(99,102,241,0.06) !important; }

        /* Details/accordion */
        details { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; background: var(--bg-card); }
        summary { padding: 14px 20px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        summary:hover { background: var(--bg-card-hover); }
        details[open] summary { border-bottom: 1px solid var(--border); }
        details .detail-body { padding: 0; }

        /* Empty state */
        .empty-state { text-align: center; padding: 48px 20px; color: var(--text-dim); }
        .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; max-width: 400px; margin: 0 auto; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Mobile hamburger */
        .mobile-header { display: none; position: sticky; top: 0; z-index: 20; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); padding: 12px 16px; align-items: center; justify-content: space-between; }
        .mobile-header .icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #a855f7); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .hamburger { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; }
        .hamburger svg { width: 24px; height: 24px; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 15; }
        .sidebar-overlay.open { display: block; }

        @media (max-width: 1200px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; height: 100vh; transform: translateX(-100%); transition: transform 0.25s ease; z-index: 20; }
            .sidebar.open { transform: translateX(0); }
            .mobile-header { display: flex; }
            .main { margin-left: 0; }
            .topbar { padding: 10px 16px; flex-wrap: wrap; gap: 8px; }
            .topbar-right { width: 100%; justify-content: space-between; }
            .content { padding: 16px; }
            .page-title { font-size: 18px; margin-bottom: 16px; }

            /* Metric cards: 2 per row on mobile */
            .metrics { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
            .metric-card { padding: 14px; }
            .metric-value { font-size: 20px; }
            .metric-label { font-size: 10px; }
            .metric-sub { font-size: 10px; }

            /* Tables: horizontal scroll */
            .panel { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            table { min-width: 600px; }
            th { padding: 8px 10px; font-size: 10px; }
            td { padding: 8px 10px; font-size: 12px; }
            .td-mono { font-size: 11px; }

            /* Panel headers */
            .panel-header { padding: 12px 14px; flex-wrap: wrap; gap: 8px; }
            .panel-header h3 { font-size: 13px; }

            /* Smaller tags */
            .tag { font-size: 10px; padding: 2px 8px; }
            .btn { padding: 6px 12px; font-size: 11px; }
        }

        @media (max-width: 400px) {
            .metrics { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Mobile header -->
    <div class="mobile-header">
        <div style="display:flex;align-items:center;gap:10px;">
            <div class="icon">W</div>
            <span style="font-weight:700;font-size:15px;">WeatherBot</span>
            <span class="mode-badge mode-{{ mode }}" style="font-size:9px;">{{ mode }}</span>
        </div>
        <button class="hamburger" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="icon">W</div>
            <div><h1>WeatherBot</h1><span>Polymarket Trading</span></div>
        </div>
        <div class="nav-section">Monitor</div>
        <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Dashboard
        </a>
        <a href="/trades" class="nav-link {% if active_page == 'trades' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Trades
        </a>
        <a href="/positions" class="nav-link {% if active_page == 'positions' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            Positions
        </a>
        <a href="/markets" class="nav-link {% if active_page == 'markets' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            Markets
        </a>
        <div class="nav-section">Analytics</div>
        <a href="/analytics" class="nav-link {% if active_page == 'analytics' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            Edge Analytics
        </a>
        <a href="/history" class="nav-link {% if active_page == 'history' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            P&L History
        </a>
        <a href="/config" class="nav-link {% if active_page == 'config' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            Settings
        </a>
        <div class="sidebar-footer">
            <div style="font-size:11px;color:var(--text-dim);">v2.0 | Pure NO Strategy</div>
        </div>
    </aside>

    <div class="main">
        <div class="topbar">
            <div class="topbar-left">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text" style="font-size:13px;font-weight:500;">Connecting...</span>
                <span class="mode-badge mode-{{ mode }}">{{ mode }}</span>
            </div>
            <div class="topbar-right">
                <span class="last-run" id="last-run">--</span>
                <button class="btn btn-primary" id="btn-rebalance" onclick="triggerRebalance()">
                    <svg style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                    Rebalance Now
                </button>
            </div>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script>
        function utcToBeijing(utcStr) {
            if (!utcStr) return '-';
            try {
                const d = new Date(utcStr.replace(' ', 'T') + (utcStr.includes('Z') || utcStr.includes('+') ? '' : 'Z'));
                const bj = new Date(d.getTime() + 8 * 3600000);
                return (bj.getMonth()+1).toString().padStart(2,'0') + '-' +
                       bj.getDate().toString().padStart(2,'0') + ' ' +
                       bj.getHours().toString().padStart(2,'0') + ':' +
                       bj.getMinutes().toString().padStart(2,'0');
            } catch(e) { return utcStr; }
        }
        async function refreshStatus() {
            try {
                const r = await fetch('/api/status');
                const d = await r.json();
                const dot = document.getElementById('status-dot');
                const txt = document.getElementById('status-text');
                dot.className = 'status-dot ' + (d.last_error ? 'err' : 'ok');
                txt.textContent = d.last_error || 'Operational';
                document.getElementById('last-run').textContent = d.last_run ? 'Last: ' + utcToBeijing(d.last_run) : '';
                // Update dashboard metric values if present
                const updates = {
                    'val-exposure': d.exposure !== undefined ? '$' + d.exposure.toFixed(2) : null,
                    'val-pnl': d.unrealized !== undefined ? '$' + d.unrealized.toFixed(2) : null,
                    'val-events': d.active_events !== undefined ? d.active_events : null,
                    'val-signals': d.signal_count !== undefined ? d.signal_count : null,
                };
                for (const [id, val] of Object.entries(updates)) {
                    if (val !== null) { const el = document.getElementById(id); if (el) el.textContent = val; }
                }
            } catch(e) {}
        }
        async function triggerRebalance() {
            const btn = document.getElementById('btn-rebalance');
            btn.disabled = true; btn.innerHTML = '<span style="opacity:0.7">Running rebalance...</span>';
            try {
                const r = await fetch('/api/trigger', {method:'POST'});
                const d = await r.json();
                if (d.ok) {
                    btn.innerHTML = '<span style="color:var(--green-text);">' + (d.signals >= 0 ? d.signals + ' signals' : 'Completed') + '</span>';
                } else {
                    btn.innerHTML = '<span style="color:var(--red-text);">Failed</span>';
                }
            } catch(e) {
                btn.innerHTML = '<span style="color:var(--red-text);">Error</span>';
            }
            setTimeout(() => { btn.disabled = false; btn.innerHTML = '<svg style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>Rebalance Now'; refreshStatus(); location.reload(); }, 3000);
        }
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }
        // Close sidebar when a nav link is clicked (mobile)
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('sidebar-overlay').classList.remove('open');
            });
        });
        refreshStatus();
        setInterval(refreshStatus, 15000);
    </script>
</body>
</html>
