# Nginx reverse-proxy config for weather-bot dashboard
# Install: sudo cp nginx/weather-bot.conf /etc/nginx/sites-available/weather-bot
#          sudo ln -s /etc/nginx/sites-available/weather-bot /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# The Docker container now binds to 127.0.0.1:5001 only (not public).
# Nginx proxies port 80 → localhost:5001, keeping the public surface minimal.

limit_req_zone $binary_remote_addr zone=weather_bot:10m rate=30r/m;

server {
    listen 80;
    server_name _;  # replace with your domain or VPS IP if desired

    location / {
        limit_req zone=weather_bot burst=10 nodelay;

        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
