strategy:
  # Minimum distance (°F) from forecast to consider buying NO
  no_distance_threshold_f: 8
  # Minimum expected value to enter a NO position
  min_no_ev: 0.03
  # Maximum USD per single slot position
  max_position_per_slot_usd: 5.0
  # Maximum USD exposure per city — enforced independently per strategy variant.
  # With 4 active strategies (A/B/C/D) each capped at this value, the real
  # cross-strategy total per city can reach up to 4× this number.
  # Each strategy variant overrides this with a tighter per-strategy value
  # (A/B/D: $30, C: $25) — see get_strategy_variants() in src/config.py.
  max_exposure_per_city_usd: 50.0
  # Maximum total USD exposure across all cities — enforced PER STRATEGY,
  # not across all strategies combined.  Four strategies can each hold up to
  # this amount, so real-world total exposure is up to 4× this figure.
  # In practice Kelly sizing keeps per-position sizes to $1–5, so actual
  # combined exposure stays well below 4× even with many open positions.
  max_total_exposure_usd: 1000.0
  # Daily loss circuit breaker (USD)
  daily_loss_limit_usd: 50.0
  # Kelly fraction multiplier (0.5 = half Kelly)
  kelly_fraction: 0.5
  # Minimum market volume (USD) to consider
  min_market_volume: 500
  # Maximum YES/NO spread to consider a slot liquid
  max_slot_spread: 0.15
  # Minimum EV to keep a position; below this → auto-trim
  min_trim_ev: 0.005
  # Maximum NO price to buy (avoid asymmetric risk at high prices)
  max_no_price: 0.85
  # EV discount for each day ahead (D+1 × 0.7, D+2 × 0.49)
  day_ahead_ev_discount: 0.7
  # Only trade markets settling within N days (远期预报不准)
  max_days_ahead: 2
  # Maximum number of open positions per event (across all slots).
  # With k×std dynamic threshold, accurate cities (15 cities at 3°F floor) now see
  # 3-4× more qualifying slots. The per-event cap remains the binding constraint and
  # is kept at 4 — EV gate (min_no_ev 0.05-0.06 per strategy variant) provides the
  # primary quality filter; per-event cap prevents over-concentration in one market.
  max_positions_per_event: 4
  # Auto-calibrate distance threshold using k×std dynamic formula (calibrator.py).
  # Accurate cities (|mean_bias|<1.5°F AND std<2.5°F): threshold = 1.2 × std → floor 3°F
  # Uncertain cities (|mean_bias|≥1.5°F OR  std≥2.5°F): threshold = 2.0 × std → up to 15°F
  # Real thresholds by city (from 2y data): Las Vegas/Phoenix/Miami 3°F, Denver 7.2°F, Cleveland 8.7°F
  # Fallback to fixed no_distance_threshold_f=8 if error_dist unavailable or <30 samples.
  auto_calibrate_distance: true
  # NOTE: calibration_confidence is retained for backward-compat but is NOT used by
  # the k×std dynamic calibrator. It was used by the older percentile-based approach.
  calibration_confidence: 0.90
  # Locked-win signals: buy NO on slots where daily max already exceeded upper bound
  enable_locked_wins: true
  locked_win_kelly_fraction: 1.0
  max_locked_win_per_slot_usd: 10.0
  # Hard NO-price ceiling for locked-win entries (partial Fix 2 rollback,
  # 2026-04-17).  Above this, paper→live slippage of one tick (0.001) wipes
  # out the residual EV.  See docs/fixes/2026-04-17-lockedwin-price-cap-rollback.md.
  locked_win_max_price: 0.95
  # Hybrid exit: force-sell within N hours of settlement when distance is close
  force_exit_hours: 1.0
  # Cooldown after exiting a slot to prevent BUY→EXIT→BUY churn
  exit_cooldown_hours: 4.0

scheduling:
  # How often to discover new markets (minutes)
  discovery_interval_minutes: 15
  # How often to rebalance positions (minutes)
  rebalance_interval_minutes: 60
  # How often to snapshot P&L (hours)
  pnl_snapshot_interval_hours: 24

