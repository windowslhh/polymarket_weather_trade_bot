strategy:
  # Minimum distance (°F) from forecast to consider buying NO
  no_distance_threshold_f: 8
  # Minimum expected value to enter a NO position
  min_no_ev: 0.02
  # YES confirmation: min probability that current temp stays in slot
  yes_confirmation_threshold: 0.85
  # Maximum USD per single slot position
  max_position_per_slot_usd: 5.0
  # Maximum USD exposure per city
  max_exposure_per_city_usd: 50.0
  # Maximum total USD exposure across all cities
  max_total_exposure_usd: 1000.0
  # Daily loss circuit breaker (USD)
  daily_loss_limit_usd: 50.0
  # Kelly fraction multiplier (0.5 = half Kelly)
  kelly_fraction: 0.5

scheduling:
  # How often to discover new markets (minutes)
  discovery_interval_minutes: 15
  # How often to rebalance positions (minutes)
  rebalance_interval_minutes: 60
  # How often to snapshot P&L (hours)
  pnl_snapshot_interval_hours: 24

